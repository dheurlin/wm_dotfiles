general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
}

listener {
    timeout = 150                                # 2.5min.
    # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-timeout = pactl list sinks | grep -c 'State: RUNNING' > /dev/null || brightnessctl -s set 10 
    # monitor backlight restore.
    on-resume = pactl list sinks | grep -c 'State: RUNNING' > /dev/null || brightnessctl -r
}

listener {
    timeout = 600
    # lock screen when timeout has passed
    on-timeout = pactl list sinks | grep -c 'State: RUNNING' > /dev/null || loginctl lock-session
}

listener {
    timeout = 330                                                     # 5.5min
    # screen off when timeout has passed
    on-timeout = pactl list sinks | grep -c 'State: RUNNING' > /dev/null || hyprctl dispatch dpms off
    # screen on when activity is detected after timeout has fired.
    on-resume = pactl list sinks | grep -c 'State: RUNNING' > /dev/null || hyprctl dispatch dpms on && brightnessctl -r
}

listener {
    timeout = 1800 # 30min
    on-timeout = pactl list sinks | grep -c 'State: RUNNING' > /dev/null || systemctl suspend                # suspend pc
}
